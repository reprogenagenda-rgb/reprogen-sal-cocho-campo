<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f5132">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPROGEN Campo">

<title>REPROGEN CAMPO COCHO V3.5</title>

<style>
:root{
  --g:#0f5132;
  --g2:#198754;
  --bg:#eef5ee;
  --card:#fff;
  --ink:#14251a;
  --muted:#5f7466;
  --ln:#d7e6d8;
  --red:#dc3545;
  --blue:#0d6efd;
  --amber:#ffc107;
  --purple:#6f42c1;
  --shadow:0 8px 24px rgba(18,64,34,.13);
  --r:20px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  min-height:100%;
  background:linear-gradient(180deg,#e7f2e8,#f6faf6);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  font-size:16px;
}

header{
  position:sticky;
  top:0;
  z-index:40;
  color:#fff;
  background:linear-gradient(135deg,#0f5132,#198754);
  padding:16px;
  box-shadow:0 5px 20px rgba(0,0,0,.22);
}

header h1{
  margin:0;
  font-size:21px;
  font-weight:900;
}

header p{
  margin:4px 0 0;
  font-size:12px;
  opacity:.88;
}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:14px 12px 90px;
}

.card{
  background:#fff;
  border:1.5px solid var(--ln);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-size:18px;
  font-weight:900;
  color:var(--g);
  margin-bottom:14px;
}

label{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:var(--muted);
  margin:10px 0 5px;
}

input,select,textarea{
  width:100%;
  min-height:56px;
  padding:14px;
  border:2px solid var(--ln);
  border-radius:16px;
  background:#f8fcf8;
  font-size:16px;
  font-weight:600;
  outline:none;
  -webkit-appearance:none;
}

textarea{
  min-height:90px;
  resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--g2);
  background:#fff;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:420px){
  .grid2{
    grid-template-columns:1fr;
  }
}

.btn{
  width:100%;
  min-height:60px;
  border:0;
  border-radius:18px;
  padding:14px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

.ok{
  background:linear-gradient(135deg,#0f5132,#198754);
  color:#fff;
}

.blue{
  background:#dbeafe;
  color:#1e3a8a;
}

.purple{
  background:#ede9fe;
  color:#4c1d95;
}

.nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  border-top:1px solid var(--ln);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  z-index:50;
}

.nav button{
  border:0;
  background:transparent;
  min-height:62px;
  font-size:11px;
  font-weight:800;
  color:#647067;
}

.nav button.on{
  color:var(--g);
  background:#eef8f0;
}

.hide{
  display:none!important;
}

.toast{
  position:fixed;
  left:14px;
  right:14px;
  bottom:80px;
  background:#0f5132;
  color:#fff;
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-size:14px;
  font-weight:800;
  display:none;
  z-index:99;
}

.toast.show{
  display:block;
}

.item{
  background:#fff;
  border:1px solid var(--ln);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.item b{
  display:block;
}

.sub{
  font-size:12px;
  color:#647067;
  margin-top:5px;
}

.preview{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:14px;
  margin-top:10px;
  display:none;
}

.preview.show{
  display:block;
}

.kpis{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  background:#fff;
  border:1px solid var(--ln);
  border-radius:18px;
  padding:14px;
  text-align:center;
}

.kpi .n{
  font-size:30px;
  color:var(--g);
  font-weight:900;
}

.kpi .l{
  font-size:11px;
  font-weight:900;
  color:#647067;
  margin-top:4px;
}
</style>
</head>

<body>

<header>
  <h1>REPROGEN CAMPO</h1>
  <p>Offline • Android • iPhone • Cochos</p>
</header>

<main class="wrap">

<section id="pgInicio">
  <div class="kpis">
    <div class="kpi">
      <div class="n" id="kHoje">0</div>
      <div class="l">HOJE</div>
    </div>

    <div class="kpi">
      <div class="n" id="kPend">0</div>
      <div class="l">PENDENTES</div>
    </div>
  </div>

  <div class="card">
    <div class="title">Ações rápidas</div>

    <button class="btn ok" onclick="ir('Registro')">
      Novo Registro
    </button>

    <button class="btn purple" onclick="ir('Fila')">
      Fila Offline
    </button>

    <button class="btn blue" onclick="sincronizar()">
      Sincronizar
    </button>
  </div>

  <div class="card">
    <div class="title">Últimos registros</div>
    <div id="listaInicio"></div>
  </div>
</section>

<section id="pgRegistro" class="hide">

  <div class="card">

    <div class="title">Novo abastecimento</div>

    <label>Fazenda</label>
    <input id="fazenda" placeholder="Fazenda São João">

    <label>Cocho</label>
    <input id="cocho" placeholder="Cocho Norte">

    <label>Operador</label>
    <input id="operador" placeholder="Marcelo">

    <div class="grid2">

      <div>
        <label>Produto</label>
        <input id="produto" placeholder="Sal mineral">
      </div>

      <div>
        <label>Quantidade</label>
        <input id="quantidade" type="number">
      </div>

    </div>

    <label>Observação</label>
    <textarea id="obs"></textarea>

    <label>Foto</label>
    <input type="file" accept="image/*" onchange="foto(this)">

    <img id="preview" class="preview">

    <button class="btn ok" onclick="salvar()">
      Salvar Offline
    </button>

  </div>

</section>

<section id="pgFila" class="hide">

  <div class="card">

    <div class="title">Fila Offline</div>

    <button class="btn blue" onclick="sincronizar()">
      Sincronizar Agora
    </button>

    <div id="listaFila"></div>

  </div>

</section>

<section id="pgConfig" class="hide">

  <div class="card">

    <div class="title">Configuração</div>

    <label>URL Apps Script</label>
    <input id="cfgUrl">

    <button class="btn ok" onclick="salvarCfg()">
      Salvar URL
    </button>

  </div>

</section>

</main>

<nav class="nav">

<button class="on" id="nvInicio" onclick="ir('Inicio')">
🏠<br>Início
</button>

<button id="nvRegistro" onclick="ir('Registro')">
📝<br>Registrar
</button>

<button id="nvFila" onclick="ir('Fila')">
⏳<br>Fila
</button>

<button id="nvConfig" onclick="ir('Config')">
⚙️<br>Config
</button>

</nav>

<div class="toast" id="toast"></div>

<script>
(function(){

'use strict';

var DB='rg_campo_v35';

function $(i){
  return document.getElementById(i);
}

function load(k,d){
  try{
    var v=localStorage.getItem(DB+'_'+k);
    return v?JSON.parse(v):d;
  }catch(e){
    return d;
  }
}

function save(k,v){
  localStorage.setItem(DB+'_'+k,JSON.stringify(v));
}

function uid(){
  return 'RG-'+Date.now();
}

function now(){
  return new Date().toISOString();
}

function toast(m){
  var t=$('toast');
  t.textContent=m;
  t.className='toast show';

  setTimeout(function(){
    t.className='toast';
  },3000);
}

window.ir=function(n){

  ['Inicio','Registro','Fila','Config']
  .forEach(function(x){
    $('pg'+x).classList.add('hide');
    $('nv'+x).classList.remove('on');
  });

  $('pg'+n).classList.remove('hide');
  $('nv'+n).classList.add('on');

  render();
};

var FOTO=null;

window.foto=function(inp){

  var f=inp.files[0];
  if(!f)return;

  var r=new FileReader();

  r.onload=function(e){

    FOTO=e.target.result;

    $('preview').src=FOTO;
    $('preview').className='preview show';
  };

  r.readAsDataURL(f);
};

window.salvar=function(){

  var fazenda=$('fazenda').value.trim();
  var cocho=$('cocho').value.trim();
  var operador=$('operador').value.trim();
  var produto=$('produto').value.trim();
  var quantidade=$('quantidade').value.trim();

  if(!fazenda || !cocho || !operador || !produto || !quantidade){

    toast('Preencha os campos obrigatórios.');
    return;
  }

  var fila=load('fila',[]);

  fila.unshift({

    id:uid(),
    data:now(),
    fazenda:fazenda,
    cocho:cocho,
    operador:operador,
    produto:produto,
    quantidade:quantidade,
    obs:$('obs').value.trim(),
    foto:FOTO,
    status:'PENDENTE'
  });

  save('fila',fila);

  $('fazenda').value='';
  $('cocho').value='';
  $('operador').value='';
  $('produto').value='';
  $('quantidade').value='';
  $('obs').value='';
  $('preview').className='preview';

  FOTO=null;

  toast('Registro salvo offline.');

  render();

  ir('Inicio');
};

window.sincronizar=function(){

  var cfg=load('cfg',{});

  if(!cfg.url){

    toast('Configure a URL.');
    ir('Config');
    return;
  }

  var fila=load('fila',[]);

  var pendentes=fila.filter(function(x){
    return x.status!=='OK';
  });

  if(!pendentes.length){

    toast('Nada pendente.');
    return;
  }

  fetch(cfg.url,{

    method:'POST',
    body:JSON.stringify({

      acao:'syncRegistros',
      registros:pendentes
    })

  })

  .then(function(r){
    return r.text();
  })

  .then(function(){

    fila.forEach(function(x){
      x.status='OK';
    });

    save('fila',fila);

    toast('Sincronizado.');

    render();
  })

  .catch(function(){

    toast('Falha no envio.');
  });
};

window.salvarCfg=function(){

  save('cfg',{

    url:$('cfgUrl').value.trim()
  });

  toast('URL salva.');
};

function render(){

  var fila=load('fila',[]);

  $('kHoje').textContent=fila.length;

  $('kPend').textContent=fila.filter(function(x){

    return x.status!=='OK';

  }).length;

  var h='';

  fila.slice(0,5).forEach(function(x){

    h+='<div class="item">'
      +'<b>'+x.fazenda+'</b>'
      +'<div class="sub">'
      +x.cocho+' • '+x.produto+' • '+x.quantidade+'kg'
      +'</div></div>';
  });

  if(!h){

    h='<div class="sub">Nenhum registro.</div>';
  }

  $('listaInicio').innerHTML=h;

  var f='';

  fila.forEach(function(x){

    f+='<div class="item">'
      +'<b>'+x.fazenda+'</b>'
      +'<div class="sub">'
      +x.status+' • '+x.cocho+' • '+x.quantidade+'kg'
      +'</div></div>';
  });

  if(!f){

    f='<div class="sub">Fila vazia.</div>';
  }

  $('listaFila').innerHTML=f;

  var cfg=load('cfg',{});

  $('cfgUrl').value=cfg.url||'';
}

render();

})();
</script>

</body>
</html>
