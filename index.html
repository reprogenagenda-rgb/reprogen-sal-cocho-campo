<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<!-- iOS: viewport-fit=cover para safe area -->
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f5132">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPROGEN">
<title>REPROGEN CAMPO V3.3</title>
<style>
:root{
  --g:#0f5132;--g2:#198754;--g3:#d1e7dd;
  --r:#dc3545;--am:#ffc107;--bl:#0d6efd;
  --ln:#c8dcc9;--bg:#e8f2e9;--card:#fff;
  --ink:#0d1f12;--muted:#4e6b52;
  /* safe area iOS */
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html{ height:100%; }
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  color:var(--ink);
  font-size:17px;
  -webkit-font-smoothing:antialiased;
  min-height:100%;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0a3d24,#0f5132);
  color:#fff;
  padding:calc(12px + var(--sat)) 16px 12px;
  position:sticky;top:0;z-index:50;
  box-shadow:0 3px 10px rgba(0,0,0,.25);
}
.header-top{ display:flex;align-items:center;justify-content:space-between; }
.header h1{ font-size:20px;font-weight:900; }
.header p{ font-size:12px;opacity:.8;margin-top:2px; }
.hpills{ display:flex;gap:6px;margin-top:8px;flex-wrap:wrap; }
.hpill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:999px;
  font-size:12px;font-weight:700;
  background:rgba(255,255,255,.15);
}
.dot{ width:9px;height:9px;border-radius:50%;background:#999; }
.dot-on{ background:#4ade80; }
.dot-off{ background:#60a5fa; }
.hdpend{
  background:rgba(255,255,255,.15);border-radius:10px;
  padding:6px 10px;font-size:12px;font-weight:700;color:#fff;
}

/* SCROLL AREA */
.conteudo{
  padding:14px 12px calc(80px + var(--sab));
  max-width:540px;margin:0 auto;
  /* iOS scroll suave */
  -webkit-overflow-scrolling:touch;
}

/* CARD */
.card{
  background:var(--card);border-radius:18px;
  box-shadow:0 4px 16px rgba(10,50,20,.12);
  padding:18px 16px;margin-bottom:14px;
  border:1.5px solid var(--ln);
}
.ctitulo{
  font-size:17px;font-weight:900;color:var(--g);
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.ctitulo .ico{ font-size:21px; }

/* CAMPO INPUT */
.campo{ margin-bottom:14px; }
.campo label{
  display:block;font-size:13px;font-weight:800;
